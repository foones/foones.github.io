function choice(a) {
  return a[Math.floor(Math.random() * a.length)];
}

function gen(start, gram) {
  res = "{" + start + "}";

  while (true) {
    var i, f;
    i = res.search("{");
    f = res.search("}");
    if (i == -1 || f < i) break;

    n = res.substring(0, i);
    ps = gram[res.substring(i + 1, f)];
    if (typeof ps != "undefined") {
      n += choice(ps);
    }
    n += res.substring(f + 1, res.length);
    res = n; 
  }
  return res;
}

function alfabetico(n) {
  return (n >= "a".charCodeAt(0) && n <= "z".charCodeAt(0))
      || (n >= "A".charCodeAt(0) && n <= "Z".charCodeAt(0));
}

function may(x) {
  var res;
  res = "";
  i = 0;
  while (i < x.length && !alfabetico(x.charCodeAt(i))) {
    res += x.substring(i, i + 1);
    ++i;
  }
  res += x.substring(i, i + 1).toUpperCase() + x.substring(i + 1, x.length);
  return res;
}

function fixContr(x) {
  return x.replace(/ de el /g, " del ").replace(/ a el /g, " al ");
}
